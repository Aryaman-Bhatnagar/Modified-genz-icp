publish_odom_tf: true  
odom_frame: odom
base_frame: base_link
publish_twist: true
twist_in_child_frame: true
twist_smoothing_alpha: 1.0
twist_min_dt: 0.001
twist_max_dt: 1.0
twist_debug: false
twist_linear_covariance: 0.25
twist_angular_covariance: 0.25
max_range: 60.0  
min_range: 1.0
voxel_size: 0.55   
desired_num_voxelized_points: 2500 
planarity_threshold: 0.2
max_points_per_voxel: 3
initial_threshold: 2.0
min_motion_th: 0.09    # Make it more sensitive to small movements
max_num_iterations: 100
convergence_criterion: 0.0001
deskew: false
enable_registration_quality_gate: true
min_registration_correspondences: 300
registration_rmse_reject_ratio: 2.5
registration_rmse_ema_alpha: 0.05
max_registration_translation_per_frame: 1.0
max_registration_rotation_per_frame_deg: 45.0
max_consecutive_registration_rejections: 5
absolute_registration_rmse_limit: 1.0
enable_imu_motion_prediction: true
imu_topic: /bf_lidar/imu_out
imu_prediction_point_time_field: auto
imu_prediction_point_time_unit: nanoseconds
imu_prediction_cloud_stamp_location: end
imu_prediction_deskew_reference: middle
imu_angular_velocity_scale: 0.017453292519943295
enable_imu_prediction_gyro_bias_calibration: true
imu_prediction_gyro_bias_calibration_seconds: 2.0
imu_prediction_gyro_bias_min_samples: 50
imu_prediction_gyro_bias: []
imu_prediction_max_gap_seconds: 0.06
imu_prediction_max_age_seconds: 0.60
imu_prediction_max_rejected_frame_age_seconds: 2.0
imu_prediction_rotation_only: true
imu_prediction_debug: true
enable_yaw_search_initializer: true
yaw_search_degrees: [-12.0, -8.0, -4.0, 0.0, 4.0, 8.0, 12.0]
yaw_search_score_max_correspondence_distance: 1.5
yaw_search_min_correspondences: 500
yaw_search_use_weighted_rmse: true
yaw_search_vertical_axis: z
yaw_search_debug: true
enable_motion_prior: true
motion_prior_translation_sigma: 0.80
motion_prior_z_sigma: 0.25
motion_prior_roll_pitch_sigma_deg: 15.0
motion_prior_yaw_sigma_deg: 50.0
motion_prior_weight: 0.25
motion_prior_apply_during_recovery: true
motion_prior_debug: true
enable_map_update_quality_gate: false
map_update_max_weighted_rmse_ratio: 1.25
map_update_max_rmse: 0.35
map_update_max_translation_delta: 0.75
map_update_max_rotation_delta_deg: 10.0
map_update_min_correspondences: 2500
map_update_debug: true
